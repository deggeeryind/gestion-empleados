<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <i class="fas fa-users"></i>
    </div>

    <h1>Gestión de Empleados</h1>

    <p>Inicia sesión para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()">
      <div class="input-group">
        <label> Correo electrónico </label>

        <div class="input">
          <i class="fas fa-envelope"></i>

          <input type="email" formControlName="correo" placeholder="admin@gmail.com" />
        </div>
      </div>

      <div class="input-group">
        <label> Contraseña </label>

        <div class="input">
          <i class="fas fa-lock"></i>

          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="********"
          />

          <i
            class="fas"
            [class.fa-eye]="!mostrarPassword"
            [class.fa-eye-slash]="mostrarPassword"
            (click)="togglePassword()"
          ></i>
        </div>
      </div>

      <button class="btn btn-primary login-btn">Iniciar Sesión</button>
    </form>
  </div>
</div>
